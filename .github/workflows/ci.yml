name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: cd backend && npm ci
      
      - name: Run tests
        run: cd backend && npm run test:run
      
      - name: Build TypeScript
        run: cd backend && npm run build

  frontend-build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: cd frontend && npm install --legacy-peer-deps
      
      - name: Build
        run: cd frontend && npm run build
      
      - name: Run tests
        run: cd frontend && npm run test:run

  lint:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Backend lint
        run: |
          cd backend
          npm ci
          npm run lint || true
      
      - name: Frontend lint
        run: |
          cd frontend
          npm ci
          npm run lint || true

  security:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Backend security audit
        run: |
          cd backend
          npm ci
          npm audit --audit-level=high
      
      - name: Frontend security audit
        run: |
          cd frontend
          npm ci
          npm audit --audit-level=high