name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9'
      
      - name: Get pnpm directory
        run: echo "$(pnpm store path --silent)" > pnpm-store.txt
      
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-store
      
      - name: Install dependencies
        working-directory: backend
        run: pnpm install
      
      - name: Run migrations on test DB
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
        run: node -e "
          const { Pool } = require('pg');
          const fs = require('fs');
          const path = require('path');
          async function migrate() {
            const pool = new Pool({ connectionString: process.env.DATABASE_URL });
            await pool.query(\`CREATE TABLE IF NOT EXISTS migrations (id SERIAL PRIMARY KEY, migration_name VARCHAR(255) NOT NULL UNIQUE, applied_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP)\`);
            const result = await pool.query('SELECT migration_name FROM migrations');
            const applied = result.rows.map(r => r.migration_name);
            const files = fs.readdirSync('./migrations').filter(f => f.endsWith('.sql')).sort();
            for (const file of files) {
              const name = file.replace('.sql', '');
              if (!applied.includes(name)) {
                console.log('Running:', name);
                const sql = fs.readFileSync(path.join('./migrations', file), 'utf8');
                const client = await pool.connect();
                await client.query('BEGIN');
                await client.query(sql);
                await client.query('INSERT INTO migrations VALUES (NULL, \$1, NOW())', [name]);
                await client.query('COMMIT');
                client.release();
              }
            }
            await pool.end();
            console.log('Migrations complete');
          }
          migrate().catch(e => { console.error(e); process.exit(1); });
        "
      
      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
        run: pnpm run test:run
      
      - name: Build TypeScript
        working-directory: backend
        run: pnpm run build

  frontend-build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9'
      
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-store
      
      - name: Install dependencies
        working-directory: frontend
        run: pnpm install
      
      - name: Build
        working-directory: frontend
        run: pnpm run build
      
      - name: Run tests
        working-directory: frontend
        run: pnpm run test:run

  lint:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9'
      
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-store
      
      - name: Install dependencies
        working-directory: backend
        run: pnpm install
      
      - name: Backend lint
        working-directory: backend
        run: pnpm run lint || true
      
      - name: Install dependencies
        working-directory: frontend
        run: pnpm install
      
      - name: Frontend lint
        working-directory: frontend
        run: pnpm run lint || true

  security:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9'
      
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-store
      
      - name: Install dependencies
        working-directory: backend
        run: pnpm install
      
      - name: Backend security audit
        working-directory: backend
        run: pnpm audit --audit-level=moderate || true
      
      - name: Install dependencies
        working-directory: frontend
        run: pnpm install
      
      - name: Frontend security audit
        working-directory: frontend
        run: pnpm audit --audit-level=moderate || true

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build, lint, security]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9'
      
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-store
      
      - name: Install dependencies
        working-directory: ./frontend
        run: pnpm install
      
      - name: Build frontend
        working-directory: ./frontend
        run: pnpm run build
      
      - name: Install Firebase CLI
        run: npm install -g firebase-tools
      
      - name: Deploy to Firebase Hosting
        working-directory: ./frontend
        run: firebase deploy --only hosting --project foodshare777

  e2e-production:
    runs-on: ubuntu-latest
    needs: [deploy-frontend]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9'
      
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-store
      
      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install
      
      - name: Install backend dependencies
        working-directory: backend
        run: pnpm install
      
      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install chromium --with-deps
      
      - name: Run migrations on test DB
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
        run: node -e "
          const { Pool } = require('pg');
          const fs = require('fs');
          const path = require('path');
          async function migrate() {
            const pool = new Pool({ connectionString: process.env.DATABASE_URL });
            await pool.query(\`CREATE TABLE IF NOT EXISTS migrations (id SERIAL PRIMARY KEY, migration_name VARCHAR(255) NOT NULL UNIQUE, applied_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP)\`);
            const result = await pool.query('SELECT migration_name FROM migrations');
            const applied = result.rows.map(r => r.migration_name);
            const files = fs.readdirSync('./migrations').filter(f => f.endsWith('.sql')).sort();
            for (const file of files) {
              const name = file.replace('.sql', '');
              if (!applied.includes(name)) {
                console.log('Running:', name);
                const sql = fs.readFileSync(path.join('./migrations', file), 'utf8');
                const client = await pool.connect();
                await client.query('BEGIN');
                await client.query(sql);
                await client.query('INSERT INTO migrations VALUES (NULL, \$1, NOW())', [name]);
                await client.query('COMMIT');
                client.release();
              }
            }
            await pool.end();
            console.log('Migrations complete');
          }
          migrate().catch(e => { console.error(e); process.exit(1); });
        "
      
      - name: Run E2E tests against production
        working-directory: frontend
        env:
          BASE_URL: ${{ secrets.USE_STATIC_URL || 'https://foodshare777.web.app' }}
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
        run: pnpm playwright test tests/e2e/donation-flow-complete.e2e.ts --project=chromium