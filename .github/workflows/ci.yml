name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9'
      
      - name: Get pnpm directory
        run: echo "$(pnpm store path --silent)" > pnpm-store.txt
      
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-store
      
      - name: Install dependencies
        working-directory: backend
        run: pnpm install
      
      - name: Run tests
        working-directory: backend
        run: pnpm run test:run
      
      - name: Build TypeScript
        working-directory: backend
        run: pnpm run build

  frontend-build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9'
      
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-store
      
      - name: Install dependencies
        working-directory: frontend
        run: pnpm install
      
      - name: Build
        working-directory: frontend
        run: pnpm run build
      
      - name: Run tests
        working-directory: frontend
        run: pnpm run test:run

  lint:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9'
      
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-store
      
      - name: Install dependencies
        working-directory: backend
        run: pnpm install
      
      - name: Backend lint
        working-directory: backend
        run: pnpm run lint || true
      
      - name: Install dependencies
        working-directory: frontend
        run: pnpm install
      
      - name: Frontend lint
        working-directory: frontend
        run: pnpm run lint || true

  security:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9'
      
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-store
      
      - name: Install dependencies
        working-directory: backend
        run: pnpm install
      
      - name: Backend security audit
        working-directory: backend
        run: pnpm audit --audit-level=moderate || true
      
      - name: Install dependencies
        working-directory: frontend
        run: pnpm install
      
      - name: Frontend security audit
        working-directory: frontend
        run: pnpm audit --audit-level=moderate || true

  e2e-production:
    runs-on: ubuntu-latest
    needs: [frontend-build]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9'
      
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-store
      
      - name: Install dependencies
        working-directory: frontend
        run: pnpm install
      
      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install chromium --with-deps
      
      - name: Run E2E tests against production
        working-directory: frontend
        env:
          BASE_URL: https://foodshare777.web.app
        run: pnpm playwright test tests/e2e/donation-flow-complete.e2e.ts --project=chromium